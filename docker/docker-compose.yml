services:
  qdrant:
    image: qdrant/qdrant
    networks: [openclaw-net]
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  openclaw:
    build:
      context: ..
      dockerfile: Dockerfile
    networks: [openclaw-net]
    env_file: ../.env
    volumes:
      - /opt/openclaw/data:/opt/openclaw/data
    restart: unless-stopped
    mem_limit: 2g
    cpus: 0.9

networks:
  openclaw-net:
    external: true

volumes:
  qdrant_storage:
